kind = "web"
previewPath = "/"
title = "BOTH & CO."
version = "1.0.0"
id = "artifacts/both-and-co"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24865

[services.development]
run = "pnpm --filter @workspace/both-and-co run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/both-and-co", "run", "build" ]
publicDir = "artifacts/both-and-co/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24865"
BASE_PATH = "/"
