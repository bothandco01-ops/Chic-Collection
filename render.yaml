services:
  - type: web
    name: both-and-co
    runtime: node
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/both-and-co run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
